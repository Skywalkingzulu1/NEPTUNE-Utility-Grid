<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Counter</title>
    <meta name="description" content="A useful web utility tool.">
    <meta name="keywords" content="tool, web, utility, online">
    <style>
        :root { --bg: #0f172a; --text: #f8fafc; --accent: #3b82f6; --card: #1e293b; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; line-height: 1.6; }
        header { background: var(--card); padding: 1.5rem; text-align: center; border-bottom: 1px solid #334155; }
        h1 { color: var(--accent); margin: 0; font-size: 1.8rem; }
        main { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .ad-space { background: #000; border: 1px dashed #334155; height: 90px; display: flex; align-items: center; justify-content: center; color: #64748b; margin: 2rem 0; border-radius: 8px; }
        .app-container { background: var(--card); padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .seo-content { margin-top: 3rem; color: #cbd5e1; }
        input, button, textarea, select { padding: 0.75rem; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; width: 100%; margin-bottom: 1rem; box-sizing: border-box; font-family: inherit; }
        button { background: var(--accent); cursor: pointer; font-weight: bold; border: none; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        #result { margin-top: 1rem; padding: 1rem; background: #0f172a; border-radius: 6px; display: none; border-left: 4px solid var(--accent); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    </style>
</head>
<body>
    <header>
        <h1>Word Counter</h1>
        <p>Free online utility</p>
    </header>

    <main>
        <!-- AD SPACE 1 -->
        <div class="ad-space" id="ad-space-top">
            <!-- Reserved for Monetization -->
            <span>Advertisement Space</span>
        </div>

        <div class="app-container">
            <textarea id="textInput" rows="6" placeholder="Paste your text here..." oninput="count()"></textarea>
                 <div class="grid-2">
                    <div style="background:#0f172a; padding:1rem; border-radius:6px; text-align:center;">Words: <strong id="wordCount" style="color:#3b82f6; font-size:1.5rem;">0</strong></div>
                    <div style="background:#0f172a; padding:1rem; border-radius:6px; text-align:center;">Characters: <strong id="charCount" style="color:#3b82f6; font-size:1.5rem;">0</strong></div>
                 </div>
            <div id="result"></div>
        </div>

        <article class="seo-content">
            <h2>About this Tool</h2>
            <p>This is a free online utility tool designed to help you accomplish tasks quickly and securely.</p>
        </article>

        <!-- AD SPACE 2 -->
        <div class="ad-space" id="ad-space-bottom">
            <!-- Reserved for Monetization -->
            <span>Advertisement Space</span>
        </div>
    </main>

    <script>
        function count() {
            const text = document.getElementById('textInput').value;
            const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
            document.getElementById('wordCount').innerText = words;
            document.getElementById('charCount').innerText = text.length;
        }
    </script>
</body>
</html>
